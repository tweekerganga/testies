<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Tech Network</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        /* Pa que no se desmadren los margenes de los cojones */
        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
        }

        /* El cuerpo de la bicha, con el color ese rosa que me lleva el colega */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d699c0;
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* He quitado el overflow este de los huevos pa que rule el scroll */
        }

        /* El bloque gordo donde va toda la mandanga */
        .main-content {
            flex: 1; 
            padding: 20px;
            text-align: center;
        }

        /* La foto del bicho, pa que no se vea como un acordeon de mierda */
        .hero-img {
            max-width: 920px;
            width: 100%;
            height: auto; 
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* Rayitas de esas pa separar, yo que se */
        hr {
            width: 50%;
            margin: 20px auto;
            border: 0;
            border-top: 3px solid #333;
        }

        .text-section {
            margin: 40px 0;
        }

        /* Lo de abajo del todo, pa poner chorradas de contacto */
        footer {
            background: #25262A;
            color: #fff;
            padding: 50px 0;
            width: 100%;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: center; 
            flex-wrap: wrap;
        }

        .footer-col {
            flex: 1;
            min-width: 250px;
            padding: 10px;
            text-align: center;
        }

        /* Animaciones de colorines pa los enlaces */
        a { transition: all 0.3s ease; }
        a:hover { color: #e701e7; }

        /* El lienzo este donde caen los gatos de los cojones */
        #rainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1; /* Pa que no te tape el texto, hostias */
        }

    </style>
</head>
<body>

    <div class="main-content">
        <a href="https://imgbb.com/">
            <img src="https://i.ibb.co/WNBSwcD5/catonthelaptop.jpg" alt="Cat on Laptop" class="hero-img" style="height: 190px;">
        </a>

        <hr>
        <h1><i>Aqui hay <b>TEXTO</b>!</i></h1>
        <hr>

        <div class="text-section">
            <h3><i>Aqui hay <b>TEXTO</b>!</i></h3>
        </div>
        
        <a href="https://imgbb.com/">
            <img src="https://i.ibb.co/WNBSwcD5/catonthelaptop.jpg" alt="Cat on Laptop" class="hero-img">
        </a>

        <div class="text-section">
            <h3><i>Aqui hay <b>TEXTO</b>!</i></h3>
        </div>
        
        <a href="https://imgbb.com/">
            <img src="https://i.ibb.co/WNBSwcD5/catonthelaptop.jpg" alt="Cat on Laptop" class="hero-img">
        </a>

        <div class="text-section">
            <h3><i>Aqui hay <b>TEXTO</b>!</i></h3>
            <a href="https://imgbb.com/">
                <img src="https://i.ibb.co/WNBSwcD5/catonthelaptop.jpg" alt="Cat on Laptop" class="hero-img">
            </a>
        </div>
    </div>

    <canvas id="rainCanvas"></canvas>

    <script>
        // Los ajustes de la lluvia, pa que no explote el pc del personal
        const CONFIG = {
            dropCount: 150,        
            minSize: 40,           
            maxSize: 150,         
            minSpeed: 5,             
            maxSpeed: 12,            
            rainDuration: 1000000000, // Tiempo infinito, hasta que se cansen los gatos
            imgSrcs: [
                'https://i.ibb.co/yn91XLWm/blunt-smoke-mlg-hitmarker-transparent-10.png',
                'https://i.ibb.co/CsmLm3WT/snoop-dogg-PNG25.png'
            ]
        };

        const canvas = document.getElementById('rainCanvas');
        const ctx = canvas.getContext('2d');
        let raining = false;
        let drops = [];
        
        // Cargando los dibus de los gatos, pesaos que son necesito contratar a 
        const loadedImages = CONFIG.imgSrcs.map(src => {
            const img = new Image();
            img.src = src;
            return img;
        });

        // El objeto gato que cae, con su giro y su hostia (hostia)
        class Drop {
            constructor() {
                this.reset(true); 
            }

            reset(isFirstSpawn = false) {
                this.size = Math.random() * (CONFIG.maxSize - CONFIG.minSize) + CONFIG.minSize;
                this.x = Math.random() * canvas.width;
                this.y = isFirstSpawn ? Math.random() * -canvas.height : -this.size;
                this.speed = Math.random() * (CONFIG.maxSpeed - CONFIG.minSpeed) + CONFIG.minSpeed;
                this.img = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                
                this.rotation = 0;
                this.spinDirection = Math.random() > 0.5 ? 1 : -1;
                this.spinSpeed = Math.random() * 0.05 + 0.02; 
            }

            update() {
                this.y += this.speed;
                this.rotation += this.spinSpeed * this.spinDirection;
                if (this.y > canvas.height) this.reset();
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
                ctx.rotate(this.rotation);
                ctx.drawImage(this.img, -this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        // Ajustar el tamaño cuando mueves mueve la ventana
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // El bucle de animacion, pa que se muevan los gatos
        function animate() {
            if (!raining) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < drops.length; i++) {
                drops[i].update();
                drops[i].draw();
            }
            requestAnimationFrame(animate);
        }

        // Empezar la mierda esta de los gatos
        function rainCats() {
            if (raining) return;
            raining = true;
            initCanvas();
            drops = Array.from({ length: CONFIG.dropCount }, () => new Drop());
            animate();
            
            setTimeout(() => {
                raining = false;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }, CONFIG.rainDuration);
        }

        // Que empiece el espectaculo al segundo de entrar, pa que de tiempo a asustarse
        window.onload = () => {
            setTimeout(() => {
                rainCats();
            }, 1000); 
        };

        window.addEventListener('resize', initCanvas);
    </script>

    <footer>
        <div class="container">
            <div class="footer-col">
                <p>Texto pero esto de aqui es el footer (donde se pone la info de contacto y eso)</p>
            </div>
        </div>
    </footer>

</body>
</html>
